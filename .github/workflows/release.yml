name: Home Assistant Release

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/toya_decoder/**"
      - "hacs.json"
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration

  prepare-release:
    needs:
      - hassfest
      - hacs
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      released: ${{ steps.bump.outputs.released }}
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      commit_changes: ${{ steps.bump.outputs.commit_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Determine next version (git-cliff)
        id: cliff_bumped
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff-release.toml
          args: --bumped-version
        env:
          OUTPUT: bumped-version.txt
          GITHUB_REPO: ${{ github.repository }}

      - name: Bump manifest version
        id: bump
        shell: bash
        env:
          CLIFF_BUMPED_VERSION: ${{ steps.cliff_bumped.outputs.content }}
        run: bash scripts/bump-version.sh

      - name: Generate release notes (git-cliff)
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff-release.toml
          args: --unreleased --tag ${{ steps.bump.outputs.tag }}
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate CHANGELOG.md (git-cliff)
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff.toml
          args: --tag ${{ steps.bump.outputs.tag }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit, tag, and push
        if: ${{ steps.bump.outputs.released == 'true' && steps.bump.outputs.commit_changes == 'true' }}
        uses: EndBug/add-and-commit@v10.0.0
        with:
          add: "custom_components/toya_decoder/manifest.json CHANGELOG.md"
          default_author: github_actions
          message: "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          tag: "${{ steps.bump.outputs.tag }}"
          push: true

      - name: Commit changelog and tag
        if: ${{ steps.bump.outputs.released == 'true' && steps.bump.outputs.commit_changes == 'false' }}
        uses: EndBug/add-and-commit@v10.0.0
        with:
          add: CHANGELOG.md
          default_author: github_actions
          message: "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          tag: "${{ steps.bump.outputs.tag }}"
          push: true

      - name: Upload release notes
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-notes
          path: release-notes.md

  build-artifact:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          persist-credentials: false

      - name: Build release zip
        run: |
          mkdir -p dist
          (cd custom_components/toya_decoder && zip -r ../../dist/toya_decoder.zip .)

      - name: Compute SHA-256 checksum
        shell: bash
        working-directory: dist
        run: sha256sum toya_decoder.zip > toya_decoder.zip.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-path: dist/toya_decoder.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-zip
          path: dist/*

  publish-release:
    needs:
      - prepare-release
      - build-artifact
    if: ${{ needs.prepare-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-zip
          path: dist

      - name: Download release notes
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-notes
          path: .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          body_path: release-notes.md
          files: |
            dist/toya_decoder.zip
            dist/toya_decoder.zip.sha256
