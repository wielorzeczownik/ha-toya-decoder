[tool.ruff]
line-length = 80
target-version = "py311"
extend-exclude = [
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".tox",
  ".venv",
  "build",
  "dist",
]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "E501",             # line length is enforced by the formatter
  "D",                # docstrings are not mandated (matches HA core)
  "ANN401",           # allow explicit typing.Any where needed
  "COM812",           # conflicts with the formatter
  "ISC001",           # conflicts with the formatter
  "TRY003",           # long messages inside raise
  "EM101", "EM102",   # string literals in exceptions
  "PLR0913",          # too many arguments (HA setup signatures)
  "PLR2004",          # magic value comparisons
  "FBT001", "FBT002", # boolean positional args (pervasive in HA)
]
fixable = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "PLR2004", "ANN", "SLF001", "ARG"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
python_version = "3.14"
strict = true
ignore_missing_imports = true
warn_unreachable = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
