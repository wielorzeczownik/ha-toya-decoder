name: Security Audit

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run audit
        id: audit
        run: |
          if pip-audit -r requirements_dev.txt; then
            echo "vulnerable=false" >> "$GITHUB_OUTPUT"
          else
            echo "vulnerable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Try pip-audit fix
        if: steps.audit.outputs.vulnerable == 'true'
        run: pip-audit -r requirements_dev.txt --fix

      - name: Re-run audit after fix
        if: steps.audit.outputs.vulnerable == 'true'
        run: pip-audit -r requirements_dev.txt

      - name: Commit fixed requirements
        if: steps.audit.outputs.vulnerable == 'true'
        uses: EndBug/add-and-commit@v10
        with:
          add: "requirements_dev.txt"
          default_author: github_actions
          message: "fix(deps): resolve audit advisories [skip ci]"
          push: true
