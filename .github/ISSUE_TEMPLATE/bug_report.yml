name: Bug report
description: Something is not working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, check if the issue already exists in [open issues](https://github.com/wielorzeczownik/ha-toya-decoder/issues).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.1.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "e.g. v1.2.0"
    validations:
      required: true

  - type: input
    id: decoder_model
    attributes:
      label: Decoder model
      placeholder: "e.g. TOYA GO decoder"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant logs from Settings > System > Logs. Enable debug logging for more detail.
      render: text
