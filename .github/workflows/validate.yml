name: Validate

on:
  pull_request:

permissions:
  contents: read

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Lint
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: check

      - name: Format check
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: format --check

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up shfmt
        uses: mfinelli/setup-shfmt@v4.0.1

      - name: Format check shell scripts
        run: shfmt --diff scripts/

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23.0.0
        with:
          globs: '**/*.md'

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements_dev.txt

      - name: Run tests
        run: pytest --cov=custom_components/toya_decoder --cov-report=term-missing
